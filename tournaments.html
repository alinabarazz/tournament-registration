<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments — Badminton</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root{
    --primary:#e8372a;--accent:#f5a623;--bg:#0a0a0a;--card:#141414;
    --border:#2a2a2a;--text:#f0f0f0;--muted:#666;--success:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;gap:16px;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(20,20,20,0.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10;}
  .topbar a{color:var(--muted);text-decoration:none;font-size:13px;transition:color 0.2s;}
  .topbar a:hover{color:var(--text);}
  .topbar .sep{color:var(--border);}
  .topbar-brand{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--primary);margin-left:auto;}

  /* LAYOUT */
  .content{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem;}

  /* HERO */
  .page-hero{margin-bottom:2.5rem;}
  .page-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem;}
  .page-title span{color:var(--primary);}
  .page-sub{color:var(--muted);font-size:0.9rem;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
  .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;line-height:1;}
  .stat-num.red{color:var(--primary);}
  .stat-num.green{color:var(--success);}
  .stat-num.amber{color:var(--accent);}

  /* SEARCH */
  .filter-row{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .filter-input{background:#111;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:10px 14px;transition:border-color 0.2s;flex:1;min-width:200px;}
  .filter-input:focus{outline:none;border-color:var(--primary);}
  .filter-select{background:#111;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:10px 14px;cursor:pointer;appearance:none;min-width:140px;}
  .filter-select:focus{outline:none;border-color:var(--primary);}

  /* GRID */
  .tournaments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;}

  /* CARD */
  .t-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.25s;display:flex;flex-direction:column;}
  .t-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 10px 30px rgba(232,55,42,0.12);}
  .t-card-top{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
  .t-card-name{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:var(--text);margin-bottom:4px;}
  .t-card-org{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .t-card-body{padding:1rem 1.25rem;flex:1;display:flex;flex-direction:column;gap:10px;}
  .t-detail{display:flex;gap:10px;align-items:flex-start;}
  .t-detail-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
  .t-detail-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1px;font-weight:800;}
  .t-detail-value{font-size:13px;color:var(--text);font-weight:400;}
  .t-card-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;}

  /* STATUS PILLS */
  .status-pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;margin-top:6px;}
  .status-pill.open{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e;}
  .status-pill.closed{background:rgba(107,114,128,0.1);border:1px solid #333;color:#666;}
  .status-pill.soon{background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.3);color:var(--accent);}
  .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  /* BUTTONS */
  .btn{padding:10px 16px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-size:13px;cursor:pointer;transition:all 0.2s;border:none;text-decoration:none;display:inline-block;text-align:center;flex:1;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:#c0281c;}
  .btn-primary:disabled{background:#444;color:#666;cursor:not-allowed;}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-secondary:hover{border-color:var(--primary);color:var(--primary);}

  /* DETAIL MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;padding:1rem;}
  .modal-overlay.open{display:flex;}
  .modal{background:#141414;border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;text-transform:uppercase;margin-bottom:1.25rem;}
  .modal-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e1e;align-items:flex-start;}
  .modal-row:last-of-type{border-bottom:none;}
  .modal-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;min-width:110px;flex-shrink:0;padding-top:1px;font-weight:400;}
  .modal-val{font-size:13px;color:var(--text);line-height:1.5;font-weight:700;}
  .modal-close-btn{margin-top:1.25rem;width:100%;}

  /* EMPTY */
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);grid-column:1/-1;}
  .empty-state .icon{font-size:2.5rem;display:block;margin-bottom:1rem;opacity:0.3;}

  /* LOADING SKELETON */
  .skeleton{background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  @media(max-width:640px){
    .stats-row{grid-template-columns:1fr 1fr;}
    .tournaments-grid{grid-template-columns:1fr;}
    .t-card-footer{flex-direction:column;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← Home</a>
  <span class="sep">|</span>
  <a href="admin.html">Admin</a>
  <div class="topbar-brand">🏆 Tournaments</div>
</div>

<div class="content">
  <div class="page-hero">
    <div class="page-title">Available <span>Tournaments</span></div>
    <div class="page-sub">Browse and register for upcoming badminton tournaments.</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Tournaments</div>
      <div class="stat-num red" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Open for Registration</div>
      <div class="stat-num green" id="statOpen">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-num amber" id="statMonth">—</div>
    </div>
  </div>

  <div class="filter-row">
    <input type="search" class="filter-input" id="searchInput" placeholder="🔍 Search by name or location..." oninput="filterTournaments()">
    <select class="filter-select" id="statusFilter" onchange="filterTournaments()">
      <option value="">All Status</option>
      <option value="open">Open Now</option>
      <option value="soon">Coming Soon</option>
      <option value="closed">Closed</option>
    </select>
  </div>

  <div class="tournaments-grid" id="tournamentsGrid">
    <div class="empty-state"><span class="icon">⏳</span>Loading tournaments...</div>
  </div>
</div>

<!-- DETAILS MODAL -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="modal-title" id="detailName">—</div>
    <div id="detailBody"></div>
    <div style="display:flex;gap:8px;margin-top:1.25rem;">
      <button class="btn btn-secondary" onclick="closeDetail()" style="flex:1;">Close</button>
      <a class="btn btn-primary" id="detailRegisterBtn" href="#" style="flex:1;">Register →</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://qpxhpvntnltsevcfxfjl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFweGhwdm50bmx0c2V2Y2Z4ZmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTMzNzIsImV4cCI6MjA5MjUyOTM3Mn0.32JNipYAhmB6vpGYV27SfW4yfT95peecqGAa6eihvaA';
  const HDRS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

  let allTournaments = [];
  let regCounts = {};

  // PH today
  function getPHToday(){
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset()*60000;
    return new Date(utc + 8*60*60000);
  }

  function getTournamentStatus(t){
    const today = getPHToday();
    const todayStr = today.toISOString().split('T')[0];
    // Registration window
    if(t.event_date_from && t.event_date_to){
      if(todayStr >= t.event_date_from && todayStr <= t.event_date_to) return 'open';
      if(todayStr < t.event_date_from) return 'soon';
      return 'closed';
    }
    if(t.status === 'Active') return 'open';
    if(t.status === 'Draft') return 'soon';
    return 'closed';
  }

  function fmt(v, opts){
    if(!v) return null;
    return new Date(v+'T00:00:00').toLocaleDateString('en-PH', opts||{month:'short',day:'numeric',year:'numeric'});
  }

  async function loadTournaments(){
    try{
      const [tRes, rRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/tournaments?select=id,name,status,owner_name,event_date_from,event_date_to,tournament_date_from,tournament_date_to,location,description,free_jersey_count,early_bird_to&order=created_at.desc`, {headers:HDRS}),
        fetch(`${SUPABASE_URL}/rest/v1/registrations?select=tournament_id,Status`, {headers:HDRS}),
      ]);
      allTournaments = await tRes.json();
      const regs = rRes.ok ? await rRes.json() : [];
      // Count approved/registered per tournament
      regs.forEach(r => {
        if(!regCounts[r.tournament_id]) regCounts[r.tournament_id] = {total:0, confirmed:0};
        regCounts[r.tournament_id].total++;
        if(['Registered','Awaiting Payment','Payment Not Received'].includes(r.Status))
          regCounts[r.tournament_id].confirmed++;
      });
      updateStats();
      renderTournaments();
    }catch(e){
      console.error(e);
      document.getElementById('tournamentsGrid').innerHTML = '<div class="empty-state"><span class="icon">❌</span>Failed to load tournaments.</div>';
    }
  }

  function updateStats(){
    const today = getPHToday();
    const thisMonth = today.getMonth();
    const thisYear  = today.getFullYear();

    const openCount  = allTournaments.filter(t => getTournamentStatus(t)==='open').length;
    const monthCount = allTournaments.filter(t => {
      const d = t.tournament_date_from || t.event_date_from;
      if(!d) return false;
      const dt = new Date(d+'T00:00:00');
      return dt.getMonth()===thisMonth && dt.getFullYear()===thisYear;
    }).length;

    document.getElementById('statTotal').textContent = allTournaments.length;
    document.getElementById('statOpen').textContent  = openCount;
    document.getElementById('statMonth').textContent = monthCount;
  }

  function filterTournaments(){
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const filtered = allTournaments.filter(t => {
      const matchQ = !q ||
        (t.name||'').toLowerCase().includes(q) ||
        (t.location||'').toLowerCase().includes(q) ||
        (t.owner_name||'').toLowerCase().includes(q);
      const matchS = !status || getTournamentStatus(t) === status;
      return matchQ && matchS;
    });
    renderCards(filtered);
  }

  function renderTournaments(){
    renderCards(allTournaments);
  }

  function renderCards(list){
    const grid = document.getElementById('tournamentsGrid');
    if(!list.length){
      grid.innerHTML = '<div class="empty-state"><span class="icon">📋</span>No tournaments found.</div>';
      return;
    }

    grid.innerHTML = list.map(t => {
      const statusKey  = getTournamentStatus(t);
      const statusLabel = statusKey==='open'?'Open Now':statusKey==='soon'?'Coming Soon':'Registration Closed';
      const regDate = t.event_date_from && t.event_date_to
        ? `${fmt(t.event_date_from)} – ${fmt(t.event_date_to)}`
        : (t.event_date_from ? `From ${fmt(t.event_date_from)}` : null);
      const evtDate = t.tournament_date_from
        ? (t.tournament_date_to && t.tournament_date_to !== t.tournament_date_from
            ? `${fmt(t.tournament_date_from)} – ${fmt(t.tournament_date_to)}`
            : fmt(t.tournament_date_from))
        : null;
      const counts = regCounts[t.id] || {total:0,confirmed:0};
      const regLink = `registration.html?t=${t.id}`;
      const canRegister = statusKey === 'open';

      return `
      <div class="t-card">
        <div class="t-card-top">
          <div class="t-card-name">${t.name}</div>
          <div class="t-card-org">${t.owner_name||'—'}</div>
          <div class="status-pill ${statusKey}">
            <span class="status-dot"></span>${statusLabel}
          </div>
        </div>
        <div class="t-card-body">
          ${regDate?`
          <div class="t-detail">
            <div class="t-detail-icon"><i class="bi bi-calendar-range"></i></div>
            <div>
              <div class="t-detail-label">Registration</div>
              <div class="t-detail-value">${regDate}</div>
            </div>
          </div>`:''}
          ${evtDate?`
          <div class="t-detail">
            <div class="t-detail-icon"><i class="bi bi-trophy"></i></div>
            <div>
              <div class="t-detail-label">Tournament Date</div>
              <div class="t-detail-value">${evtDate}</div>
            </div>
          </div>`:''}
          ${t.location?`
          <div class="t-detail">
            <div class="t-detail-icon"><i class="bi bi-geo-alt-fill"></i></div>
            <div>
              <div class="t-detail-label">Location</div>
              <div class="t-detail-value"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.location)}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;text-transform:uppercase;font-weight:600;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text)'">${t.location.toUpperCase()}</a></div>
            </div>
          </div>`:''}
          ${t.free_jersey_count?`
          <div class="t-detail">
            <div class="t-detail-icon"><i class="bi bi-shirt-fill"></i></div>
            <div>
              <div class="t-detail-label">Free Jersey</div>
              <div class="t-detail-value">FIRST ${t.free_jersey_count} PLAYERS</div>
            </div>
          </div>`:''}
        </div>
        <div class="t-card-footer">
          <a href="${canRegister?regLink:'#'}"
             class="btn btn-primary"
             ${!canRegister?'onclick="return false;" style="background:#333;color:#555;cursor:not-allowed;"':''}
          >${canRegister?'Register →':'Registration Closed'}</a>
          <button class="btn btn-secondary" onclick='showDetail(${JSON.stringify(t).replace(/'/g,"&#39;")})'>Details</button>
        </div>
      </div>`;
    }).join('');
  }

  function showDetail(t){
    const statusKey   = getTournamentStatus(t);
    const statusLabel = statusKey==='open'?'Open Now':statusKey==='soon'?'Coming Soon':'Closed';
    const regDate = t.event_date_from && t.event_date_to
      ? `${fmt(t.event_date_from)} – ${fmt(t.event_date_to)}`
      : '—';
    const evtDate = t.tournament_date_from
      ? (t.tournament_date_to && t.tournament_date_to !== t.tournament_date_from
          ? `${fmt(t.tournament_date_from)} – ${fmt(t.tournament_date_to)}`
          : fmt(t.tournament_date_from))
      : '—';
    const counts = regCounts[t.id] || {total:0,confirmed:0};

    document.getElementById('detailName').textContent = t.name;
    const statusColor = statusKey==='open' ? '#22c55e' : statusKey==='soon' ? '#f5a623' : '#666';
    document.getElementById('detailBody').innerHTML = `
      <div class="modal-row"><span class="modal-label">Organizer</span><span class="modal-val">${t.owner_name||'—'}</span></div>
      <div class="modal-row"><span class="modal-label">Status</span><span class="modal-val" style="color:${statusColor};font-weight:700;">${statusLabel}</span></div>
      <div class="modal-row"><span class="modal-label">Registration</span><span class="modal-val">${regDate}</span></div>
      <div class="modal-row"><span class="modal-label">Tournament</span><span class="modal-val">${evtDate}</span></div>
      ${t.early_bird_to?`<div class="modal-row"><span class="modal-label">Early Bird</span><span class="modal-val">Until ${fmt(t.early_bird_to)}</span></div>`:''}
      <div class="modal-row"><span class="modal-label">Location</span><span class="modal-val"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.location||'')}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:underline;text-decoration-color:#333;">${(t.location||'—').toUpperCase()}</a></span></div>
      ${t.free_jersey_count?`<div class="modal-row"><span class="modal-label">Free Jersey</span><span class="modal-val" style="text-transform:uppercase;font-weight:700;">First ${t.free_jersey_count} Players</span></div>`:''}
      ${t.description?`<div class="modal-row"><span class="modal-label">Notes</span><span class="modal-val">${t.description}</span></div>`:''}
    `;
    const regBtn = document.getElementById('detailRegisterBtn');
    if(statusKey==='open'){
      regBtn.href = `registration.html?t=${t.id}`;
      regBtn.style.cssText = '';
      regBtn.textContent = 'Register →';
    } else {
      regBtn.href = '#';
      regBtn.style.cssText = 'background:#333;color:#555;cursor:not-allowed;pointer-events:none;';
      regBtn.textContent = 'Registration Closed';
    }
    document.getElementById('detailModal').classList.add('open');
  }

  function closeDetail(){
    document.getElementById('detailModal').classList.remove('open');
  }

  loadTournaments();
</script>
</body>
</html>
