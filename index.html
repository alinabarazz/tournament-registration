<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #e8372a;
    --primary-dark: #b82a1f;
    --accent: #f5a623;
    --bg: #0a0a0a;
    --card: #141414;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* Hero */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }

  /* Animated shuttlecock background */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,55,42,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(245,166,35,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Court lines decoration */
  .court-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
  }

  .court-lines::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #fff;
    transform: translateX(-50%);
  }

  .court-lines::after {
    content: '';
    position: absolute;
    left: 10%;
    right: 10%;
    top: 50%;
    height: 1px;
    background: #fff;
  }

  .floating-shuttle {
    position: absolute;
    font-size: 4rem;
    opacity: 0.04;
    animation: floatShuttle 8s ease-in-out infinite;
  }

  .floating-shuttle:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
  .floating-shuttle:nth-child(2) { top: 60%; right: 8%; animation-delay: 2s; font-size: 6rem; }
  .floating-shuttle:nth-child(3) { bottom: 15%; left: 15%; animation-delay: 4s; font-size: 3rem; }

  @keyframes floatShuttle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,55,42,0.15);
    border: 1px solid rgba(232,55,42,0.3);
    color: var(--primary);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s ease both;
  }

  .hero-badge::before { content: '●'; font-size: 8px; animation: pulse 1.5s ease infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(3.5rem, 12vw, 8rem);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: -0.01em;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .hero-title .line2 { color: var(--primary); display: block; }
  .hero-title .line3 { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.3); display: block; font-size: 0.7em; }

  .hero-sub {
    color: var(--muted);
    font-size: 1rem;
    max-width: 400px;
    margin: 0 auto 3rem;
    line-height: 1.6;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }

  /* Nav cards */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    max-width: 640px;
    width: 100%;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .nav-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 1.75rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s;
    overflow: hidden;
    cursor: pointer;
  }

  .nav-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--primary);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .nav-card:hover::before { opacity: 0.06; }
  .nav-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(232,55,42,0.15); }

  .nav-card .icon {
    position: relative;
    font-size: 2rem;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(232,55,42,0.1);
    border-radius: 14px;
    transition: transform 0.25s;
  }

  .nav-card:hover .icon { transform: scale(1.1); }

  .nav-card .label {
    position: relative;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .nav-card .desc {
    position: relative;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
  }

  .nav-card.featured { border-color: rgba(232,55,42,0.4); background: linear-gradient(135deg, #1a0a0a, #141414); }
  .nav-card.featured .icon { background: var(--primary); }

  /* Stats bar */
  .stats-bar {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2rem;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .stat { text-align: center; }
  .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  @media (max-width: 480px) {
    .nav-grid { grid-template-columns: 1fr; max-width: 280px; }
    .stats-bar { gap: 1.25rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="court-lines"></div>
  <span class="floating-shuttle">🏸</span>
  <span class="floating-shuttle">🏸</span>
  <span class="floating-shuttle">🏸</span>

  <div class="hero-badge">Live Tournament Season 2025</div>

  <h1 class="hero-title">
    Badminton
    <span class="line2">Tournament</span>
    <span class="line3">Championship</span>
  </h1>

  <p class="hero-sub">Register your team, track tournaments, and manage results all in one place.</p>

  <div class="nav-grid">
    <a class="nav-card featured" href="registration.html">
      <div class="icon">📋</div>
      <div class="label">Registration</div>
      <div class="desc">Register your doubles team</div>
    </a>
    <a class="nav-card" href="admin.html">
      <div class="icon">⚙️</div>
      <div class="label">Admin</div>
      <div class="desc">Manage teams & entries</div>
    </a>
    <a class="nav-card" href="tournaments.html">
      <div class="icon">🏆</div>
      <div class="label">Tournaments</div>
      <div class="desc">View brackets & results</div>
    </a>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num">11</div><div class="stat-label">Levels</div></div>
    <div class="stat"><div class="stat-num">2v2</div><div class="stat-label">Format</div></div>
    <div class="stat"><div class="stat-num">Open</div><div class="stat-label">Registration</div></div>
  </div>
</div>

</body>
</html>
