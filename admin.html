<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Badminton Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --primary:#e8372a; --bg:#0a0a0a; --card:#141414; --border:#2a2a2a; --text:#f0f0f0; --muted:#666; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .topbar { display:flex; align-items:center; gap:16px; padding:1rem 1.5rem; border-bottom:1px solid var(--border); background:var(--card); }
  .topbar a { color:var(--muted); text-decoration:none; font-size:13px; }
  .topbar a:hover { color:var(--text); }
  .topbar .sep { color:var(--border); }
  .topbar h1 { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; margin-left:auto; color:var(--primary); }
  .content { max-width:900px; margin:0 auto; padding:2rem 1rem; }
  .page-title { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:800; text-transform:uppercase; margin-bottom:0.25rem; }
  .page-sub { color:var(--muted); font-size:0.9rem; margin-bottom:2rem; }
  .coming-soon { text-align:center; padding:5rem 1rem; }
  .coming-soon .icon { font-size:4rem; margin-bottom:1rem; opacity:0.4; }
  .coming-soon h2 { font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:700; text-transform:uppercase; color:var(--muted); }
  .coming-soon p { color:var(--muted); font-size:0.9rem; margin-top:0.5rem; }
  .back-btn { display:inline-flex; align-items:center; gap:8px; background:transparent; border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; text-decoration:none; margin-top:2rem; transition:all 0.2s; }
  .back-btn:hover { border-color:var(--text); color:var(--text); }
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← Home</a>
  <span class="sep">|</span>
  <a href="registration.html">Registration</a>
  <span class="sep">|</span>
  <a href="tournaments.html">Tournaments</a>
  <h1>⚙️ Admin</h1>
</div>
<div class="content">
  <div class="page-title">Admin Panel</div>
  <div class="page-sub">Manage registrations, teams, and tournament entries.</div>
  <div class="coming-soon">
    <div class="icon">⚙️</div>
    <h2>Coming Soon</h2>
    <p>Admin panel is under construction.<br>Check back soon for team management features.</p>
    <a class="back-btn" href="index.html">← Back to Home</a>
  </div>
</div>
</body>
</html>
