<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments — Badminton Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--primary:#e8372a;--accent:#f5a623;--bg:#0a0a0a;--card:#141414;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--success:#22c55e;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{display:flex;align-items:center;gap:16px;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:10;}
  .topbar a{color:var(--muted);text-decoration:none;font-size:13px;transition:color 0.2s;}
  .topbar a:hover{color:var(--text);}
  .topbar .sep{color:var(--border);}
  .topbar-brand{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--primary);}
  .content{max-width:1200px;margin:0 auto;padding:2rem 1rem;}
  .page-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;text-transform:uppercase;margin-bottom:0.5rem;}
  .page-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;}
  .tournaments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;margin-bottom:2rem;}
  .tournament-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.3s;cursor:pointer;}
  .tournament-card:hover{border-color:var(--primary);transform:translateY(-4px);}
  .tournament-header{background:linear-gradient(135deg,#1a1a1a 0%,#0f0f0f 100%);padding:1.5rem;border-bottom:1px solid var(--border);}
  .tournament-name{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--text);margin-bottom:0.5rem;}
  .tournament-org{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .tournament-body{padding:1.5rem;}
  .tournament-detail{display:flex;align-items:flex-start;gap:12px;margin-bottom:1rem;}
  .tournament-detail:last-child{margin-bottom:0;}
  .detail-icon{font-size:1.2rem;flex-shrink:0;margin-top:2px;}
  .detail-content{flex:1;}
  .detail-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;}
  .detail-value{font-size:0.95rem;color:var(--text);}
  .tournament-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:10px;}
  .btn{padding:10px 16px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;font-size:12px;cursor:pointer;transition:all 0.2s;border:none;text-decoration:none;display:inline-block;flex:1;text-align:center;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:#b82a1f;}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-secondary:hover{border-color:var(--primary);color:var(--primary);}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
  .empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:0.3;display:block;}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
  .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;color:var(--primary);}
  .filter-row{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
  .filter-input{background:#111;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:8px 14px;transition:border-color 0.2s;flex:1;min-width:200px;}
  .filter-input:focus{outline:none;border-color:var(--primary);}
  @media(max-width:768px){.tournaments-grid{grid-template-columns:1fr;}.tournament-footer{flex-direction:column;}.btn{flex:auto;}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← Home</a>
  <span class="sep">|</span>
  <a href="registration.html">Registration</a>
  <span class="sep">|</span>
  <a href="admin.html">Admin</a>
  <div class="topbar-brand">🏆 Tournaments</div>
</div>

<div class="content">
  <div class="page-title">Available Tournaments</div>
  <div class="page-sub">Browse and register for upcoming badminton tournaments in your area.</div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Tournaments</div><div class="stat-num" id="totalTournaments">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Registrations</div><div class="stat-num" id="totalRegistrations">—</div></div>
    <div class="stat-card"><div class="stat-label">Upcoming Events</div><div class="stat-num" id="upcomingEvents">—</div></div>
  </div>

  <div class="filter-row">
    <input type="search" class="filter-input" id="searchInput" placeholder="🔍 Search tournaments by name or location..." oninput="filterTournaments()">
  </div>

  <div class="tournaments-grid" id="tournamentsGrid">
    <div class="empty-state"><span class="icon">📋</span>Loading tournaments...</div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://qpxhpvntnltsevcfxfjl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFweGhwdm50bmx0c2V2Y2Z4ZmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTMzNzIsImV4cCI6MjA5MjUyOTM3Mn0.32JNipYAhmB6vpGYV27SfW4yfT95peecqGAa6eihvaA';

  let allTournaments = [];
  let allRegistrations = [];

  async function loadTournaments() {
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/tournaments`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json'
        }
      });

      allTournaments = await response.json();
      renderTournaments();
      updateStats();
    } catch (error) {
      console.error('Error loading tournaments:', error);
      document.getElementById('tournamentsGrid').innerHTML = '<div class="empty-state"><span class="icon">❌</span>Error loading tournaments</div>';
    }
  }

  async function loadRegistrations() {
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/registrations`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json'
        }
      });

      allRegistrations = await response.json();
      updateStats();
    } catch (error) {
      console.error('Error loading registrations:', error);
    }
  }

  function renderTournaments() {
    const grid = document.getElementById('tournamentsGrid');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allTournaments.filter(t => 
      t.name.toLowerCase().includes(searchTerm) || 
      t.location.toLowerCase().includes(searchTerm)
    );

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><span class="icon">📋</span>No tournaments found</div>';
      return;
    }

    grid.innerHTML = filtered.map(tournament => {
      const startDate = new Date(tournament.schedule_from).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const endDate = new Date(tournament.schedule_to).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const registrationCount = allRegistrations.filter(r => r.tournament_id === tournament.id).length;

      return `
        <div class="tournament-card">
          <div class="tournament-header">
            <div class="tournament-name">${tournament.name}</div>
            <div class="tournament-org">${tournament.organization || 'General'}</div>
          </div>
          <div class="tournament-body">
            <div class="tournament-detail">
              <div class="detail-icon">📅</div>
              <div class="detail-content">
                <div class="detail-label">Schedule</div>
                <div class="detail-value">${startDate} - ${endDate}</div>
              </div>
            </div>
            <div class="tournament-detail">
              <div class="detail-icon">📍</div>
              <div class="detail-content">
                <div class="detail-label">Location</div>
                <div class="detail-value">${tournament.location}</div>
              </div>
            </div>
            <div class="tournament-detail">
              <div class="detail-icon">👥</div>
              <div class="detail-content">
                <div class="detail-label">Registrations</div>
                <div class="detail-value">${registrationCount} teams registered</div>
              </div>
            </div>
          </div>
          <div class="tournament-footer">
            <a href="registration.html" class="btn btn-primary">Register</a>
            <button class="btn btn-secondary" onclick="viewDetails(${tournament.id})">Details</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterTournaments() {
    renderTournaments();
  }

  function updateStats() {
    document.getElementById('totalTournaments').textContent = allTournaments.length;
    document.getElementById('totalRegistrations').textContent = allRegistrations.length;
    
    const today = new Date();
    const upcoming = allTournaments.filter(t => new Date(t.schedule_from) >= today).length;
    document.getElementById('upcomingEvents').textContent = upcoming;
  }

  function viewDetails(tournamentId) {
    const tournament = allTournaments.find(t => t.id === tournamentId);
    if (tournament) {
      alert(`Tournament: ${tournament.name}\n\nLocation: ${tournament.location}\n\nSchedule: ${tournament.schedule_from} to ${tournament.schedule_to}\n\nClick "Register" to join this tournament.`);
    }
  }

  window.addEventListener('load', () => {
    loadTournaments();
    loadRegistrations();
  });
</script>

</body>
</html>
